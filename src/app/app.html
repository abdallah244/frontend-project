<!-- Navbar -->
<nav class="navbar">
  <!-- Logo -->
  <div class="logo">
    <img src="https://bing.com/th/id/BCO.01a2528b-e181-4737-8f58-16ce6c1b6194.png" alt="Logo" (click)="navigateToDashboard()" style="cursor: pointer;" />
  </div>

  <!-- Search -->
  <div class="search-box">
    <input type="text" placeholder="Search..." />
    <button>
      <span class="material-icons">search</span>
    </button>
  </div>

  <!-- Hamburger Icon -->
  <div class="hamburger" (click)="toggleMenu()">☰</div>

  <!-- Links -->
  <ul class="nav-links" [class.active]="menuOpen">
    <li><a (click)="navigateToDashboard()">Home</a></li>
    <li><a (click)="handleNavClick('products')">Products</a></li>
    <li class="cart">
      <a (click)="handleNavClick('cart')">🛒 Cart <span class="cart-count">{{cartCount}}</span></a>
    </li>
    <li *ngIf="authService.getUserRole() === 'admin'">
      <a routerLink="/admin/dashboard">⚙️ Admin Dashboard</a>
    </li>
    <li *ngIf="!authService.isLoggedIn()"><a routerLink="/login">Login</a></li>
    <li *ngIf="authService.isLoggedIn()" (click)="onLogout()" style="cursor: pointer;">Logout</li>
  </ul>
</nav>

<router-outlet></router-outlet>

<footer class="footer">
  <p>© 2025 MrCloth | Abdallah hany</p>
</footer>

<!-- Login Modal -->
<div class="modal" *ngIf="showModal">
  <div class="modal-content">
    <p>Please login first!</p>
    <button routerLink="/login" (click)="closeModal()">Login</button>
    <button (click)="closeModal()">Close</button>
  </div>
</div>
